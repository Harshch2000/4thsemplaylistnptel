<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyTube - Video Player</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }
        iframe { width: 100%; height: 240px; border-radius: 10px; }
        .video-card { transition: 0.3s; border-radius: 12px; }
        .video-card:hover { transform: translateY(-4px); box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h1">StudyTube</span>
</nav>

<div class="container mt-4">
    <h2 class="fw-bold text-center mb-4">All Videos</h2>
    <div class="row" id="videoContainer"></div>
</div>

<script>
// 🔥 NO-FETCH VERSION
// Add your videos manually in this array

const videos = [
    {
        title: "Complete AI Artificial Intelligence in one shot | Semester Exam | Hindi",
        url: "https://www.youtube.com/watch?v=yiXAmkimZRQ"
    },
    {
        title: "Big Data Full Course in 1 Video | Notes + Examples",
        url: "https://www.youtube.com/watch?v=pyJJJaZOrbs"
    },
    {
        title: "Python One Shot 4Hrs | Semester Exam",
        url: "https://www.youtube.com/watch?v=4CtUyzSters"
    },
    {
        title: "Software Testing OneShot 4Hrs | Semester Exam",
        url: "https://www.youtube.com/watch?v=BjfTANG5b4c"
    },
    {
        title: "Cloud Computing OneShot 4Hrs | Semester Exam",
        url: "https://www.youtube.com/watch?v=6l88XYUjNIs"
    }
];

// Render videos
const container = document.getElementById("videoContainer");

videos.forEach(video => {
    const match = video.url.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
    if (!match) return;

    const videoId = match[1];
    const embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}`;

    container.innerHTML += `
        <div class="col-md-4 mb-4">
            <div class="card video-card p-2">
                <iframe src="${embedUrl}" allowfullscreen></iframe>
                <div class="p-2">
                    <h6 class="fw-bold">${video.title}</h6>
                </div>
            </div>
        </div>
    `;
});
</script>

</body>
</html>
