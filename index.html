<!DOCTYPE html>
<html>
<head>
    <title>StudyTube Proxy Player</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }
        iframe { width: 100%; height: 300px; border-radius: 10px; }
        .video-card { transition: 0.3s; border-radius: 12px; }
        .video-card:hover { transform: translateY(-4px); box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h1">StudyTube</span>
</nav>

<div class="container mt-4">
    <h2 class="fw-bold text-center mb-4">All Videos</h2>
    <div class="row" id="videoContainer"></div>
</div>

<script>
// Your videos here
const videos = [
    { title: "AI One Shot", id: "yiXAmkimZRQ" },
    { title: "Big Data One Shot", id: "pyJJJaZOrbs" },
    { title: "Python One Shot", id: "4CtUyzSters" },
    { title: "Software Testing One Shot", id: "BjfTANG5b4c" },
    { title: "Cloud Computing One Shot", id: "6l88XYUjNIs" }
];

const container = document.getElementById("videoContainer");

videos.forEach(v => {
    container.innerHTML += `
        <div class="col-md-4 mb-4">
            <div class="card video-card p-2">
                <iframe src="proxy.html?id=${v.id}" allow="autoplay" allowfullscreen></iframe>
                <div class="p-2">
                    <h6 class="fw-bold">${v.title}</h6>
                </div>
            </div>
        </div>
    `;
});
</script>

</body>
</html>
