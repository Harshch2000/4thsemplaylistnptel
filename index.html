<script>
// Load the CSV
fetch("videos.csv")
    .then(res => res.text())
    .then(csv => {
        const lines = csv.trim().split("\n").slice(1);
        const container = document.getElementById("videoContainer");

        lines.forEach(line => {
            // Safe CSV parse for "title","url"
            const parts = line.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);
            if (!parts || parts.length < 2) return;

            const cleanTitle = parts[0].replace(/(^"|"$)/g, "");
            const cleanUrl = parts[1].replace(/(^"|"$)/g, "");

            // Extract YouTube ID
            const match = cleanUrl.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
            if (!match) return;

            const videoId = match[1];
            const embedUrl = `https://www.youtube-nocookie.com/embed/${videoId}`;

            container.innerHTML += `
                <div class="col-md-4 mb-4">
                    <div class="card video-card p-2">
                        <iframe src="${embedUrl}" allowfullscreen></iframe>
                        <div class="p-2">
                            <h6 class="fw-bold">${cleanTitle}</h6>
                        </div>
                    </div>
                </div>
            `;
        });
    })
    .catch(err => console.error("CSV Load Error:", err));
</script>
