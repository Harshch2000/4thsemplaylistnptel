<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyTube - Video Player</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        iframe { width: 100%; height: 240px; border-radius: 10px; }
        .video-card { transition: 0.3s; border-radius: 12px; }
        .video-card:hover { transform: translateY(-4px); box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-3">
    <span class="navbar-brand mb-0 h1">StudyTube</span>
</nav>

<div class="container mt-4">
    <h2 class="fw-bold text-center mb-4">All Videos</h2>
    <div class="row" id="videoContainer"></div>
</div>

<script>
// Load CSV File
fetch("videos.csv")
    .then(response => response.text())
    .then(csv => {
        const rows = csv.trim().split("\n").slice(1); // Skip header
        const container = document.getElementById("videoContainer");

        rows.forEach(row => {
            const [title, url] = row.split(/,(.+)/);
            const cleanTitle = title.replace(/"/g, "");
            const cleanUrl = url.replace(/"/g, "");

            const idMatch = cleanUrl.match(/(?:v=|youtu\.be\/)([a-zA-Z0-9_-]+)/);
            if (!idMatch) return;

            const videoId = idMatch[1];
            const embedUrl = `https://www.youtube.com/embed/${videoId}?rel=0`;

            const col = document.createElement("div");
            col.className = "col-md-4 mb-4";

            col.innerHTML = `
                <div class="card video-card p-2">
                    <iframe src="${embedUrl}" allowfullscreen></iframe>
                    <div class="p-2">
                        <h6 class="fw-bold">${cleanTitle}</h6>
                    </div>
                </div>
            `;

            container.appendChild(col);
        });
    });
</script>

</body>
</html>
